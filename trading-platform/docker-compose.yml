version: "3.9"

services:
  # ============================================================
  # Infrastructure
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_MS: 3600000
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading123
    volumes:
      - ./configs/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-replica:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading123
    volumes:
      - ./configs/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.routing.allocation.disk.threshold_enabled=false
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ============================================================
  # Services
  # ============================================================
  gateway:
    build: ./services/gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      ORDER_SERVICE_URL: http://order-service:8001
      QUOTE_SERVICE_URL: http://quote-service:8002
      ANALYTICS_SERVICE_URL: http://analytics:8003
      RISK_ENGINE_URL: http://risk-engine:8004
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-service:
    build: ./services/order-service
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      DATABASE_URL: postgresql://trading:trading123@postgres:5432/trading
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
      QUOTE_SERVICE_URL: http://quote-service:8002
      RISK_ENGINE_URL: http://risk-engine:8004
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  quote-service:
    build: ./services/quote-service
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis:6379

  analytics:
    build: ./services/analytics
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      DATABASE_URL: postgresql://trading:trading123@postgres:5432/trading
      ELASTICSEARCH_URL: http://elasticsearch:9200
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy

  risk-engine:
    build: ./services/risk-engine
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
      DATABASE_URL: postgresql://trading:trading123@postgres:5432/trading
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  event-processor:
    build: ./services/event-processor
    environment:
      KAFKA_BROKERS: kafka:29092
      DATABASE_URL: postgresql://trading:trading123@postgres:5432/trading
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  legacy-adapter:
    build: ./services/legacy-adapter
    environment:
      KAFKA_BROKERS: kafka:29092
      MQ_STYLE: ibm-mq
    depends_on:
      kafka:
        condition: service_healthy

  market-data-sim:
    build: ./services/market-data-sim
    environment:
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis:6379
      TICK_INTERVAL_MS: 100
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  batch-reconciler:
    build: ./services/batch-reconciler
    environment:
      DATABASE_URL: postgresql://trading:trading123@postgres:5432/trading
      KAFKA_BROKERS: kafka:29092
      ELASTICSEARCH_URL: http://elasticsearch:9200
      REDIS_URL: redis://redis:6379
      RECONCILIATION_INTERVAL: 300
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  traffic-generator:
    build: ./traffic-generator
    environment:
      GATEWAY_URL: http://gateway:3000
      KAFKA_BROKERS: kafka:29092
      TARGET_RPS: 500
      BURST_MULTIPLIER: 10
      CHAOS_ENABLED: "true"
    depends_on:
      - gateway
      - order-service
      - quote-service
      - analytics
      - risk-engine

  ui:
    build: ./services/ui
    ports:
      - "8080:80"
    depends_on:
      - gateway

volumes:
  pgdata:
